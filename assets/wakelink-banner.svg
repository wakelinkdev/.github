<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <!-- Background -->
  <rect width="1200" height="400" fill="#0F1429"/>
  
  <!-- Logo -->
  <g transform="translate(100, 146)">
    <!-- WiFi dot (bottom center) -->
    <circle cx="54" cy="70" r="4" fill="#FFFFFF"/>
    
    <!-- WiFi wave 1 (inner) -->
    <path d="M46,62 Q54,56 62,62" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="3.5" 
          stroke-linecap="round"/>
          
    <!-- WiFi wave 2 (middle) -->
    <path d="M40,55 Q54,46 68,55" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="3.5" 
          stroke-linecap="round"/>
          
    <!-- WiFi wave 3 (outer) -->
    <path d="M34,48 Q54,36 74,48" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="3.5" 
          stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="320" y="220" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="72" font-weight="700" fill="#F8FAFC">WakeLink</text>
  <text x="320" y="280" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="28" font-weight="400" fill="#94A3B8">Secure Remote Computer Management</text>
</svg>